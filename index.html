<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Weather App</title>
  </head>
  <body>
    <main class="px-4 py-5">
      <!-- Search Bar -->
      <div class="max-w-md mx-auto mb-5">
        <div
          class="flex items-center gap-2 border border-gray-300 rounded-lg px-4 py-3 bg-white focus-within:border-blue-400 transition-colors"
        >
          <input
            type="text"
            id="search-input"
            placeholder="Search city — e.g. Mumbai, Tokyo, London"
            class="w-full outline-none bg-transparent text-gray-700 text-sm placeholder-gray-400"
          />
          <button
            type="button"
            id="search-btn"
            class="shrink-0 text-gray-500 hover:text-blue-500 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 192.904 192.904"
              width="16px"
              class="fill-current"
            >
              <path
                d="m190.707 180.101-47.078-47.077c11.702-14.072 18.752-32.142 18.752-51.831C162.381 36.423 125.959 0 81.191 0 36.422 0 0 36.423 0 81.193c0 44.767 36.422 81.187 81.191 81.187 19.688 0 37.759-7.049 51.831-18.751l47.079 47.078a7.474 7.474 0 0 0 5.303 2.197 7.498 7.498 0 0 0 5.303-12.803zM15 81.193C15 44.694 44.693 15 81.191 15c36.497 0 66.189 29.694 66.189 66.193 0 36.496-29.692 66.187-66.189 66.187C44.693 147.38 15 117.689 15 81.193z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Error Bar (hidden by default) -->
      <div
        id="error-bar"
        class="hidden max-w-md mx-auto mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-500"
      >
        City not found. Please try a different name.
      </div>

      <!-- Main Weather Card -->
      <div class="border border-blue-200 rounded-lg max-w-md mx-auto p-6 mb-4">
        <div class="flex justify-between items-start">
          <!-- Left: City info + icon -->
          <div class="flex flex-col gap-1">
            <h1 id="city-name" class="text-2xl font-medium text-gray-800">
              New Delhi
            </h1>
            <p id="city-country" class="text-sm text-gray-500">India</p>
            <p id="city-date" class="text-sm text-gray-500">Mon, 6 Apr 2026</p>
            <span id="weather-icon" class="text-4xl mt-3">⛅</span>
          </div>

          <!-- Right: Temperature + condition -->
          <div class="flex flex-col items-end">
            <span id="temperature" class="text-6xl font-medium text-gray-800"
              >34°</span
            >
            <span id="weather-condition" class="text-sm text-gray-500 mt-2"
              >Partly cloudy</span
            >
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="grid grid-cols-3 gap-3 max-w-md mx-auto mb-4">
        <div class="bg-gray-100 rounded-md p-4 flex flex-col gap-1">
          <span class="text-xs text-gray-500 uppercase tracking-wide"
            >Humidity</span
          >
          <span id="humidity" class="text-xl font-medium text-gray-800"
            >42 <span class="text-xs text-gray-400">%</span></span
          >
        </div>

        <div class="bg-gray-100 rounded-md p-4 flex flex-col gap-1">
          <span class="text-xs text-gray-500 uppercase tracking-wide"
            >Wind</span
          >
          <span id="wind-speed" class="text-xl font-medium text-gray-800"
            >18 <span class="text-xs text-gray-400">km/h</span></span
          >
        </div>

        <div class="bg-gray-100 rounded-md p-4 flex flex-col gap-1">
          <span class="text-xs text-gray-500 uppercase tracking-wide"
            >Feels like</span
          >
          <span id="feels-like" class="text-xl font-medium text-gray-800"
            >37 <span class="text-xs text-gray-400">°C</span></span
          >
        </div>
      </div>

      <!-- Divider -->
      <hr class="max-w-md mx-auto mb-4 border-gray-200" />

      <!-- 7-Day Forecast -->
      <div class="max-w-md mx-auto">
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">
          7-day forecast
        </p>

        <div
          class="grid grid-cols-4 sm:grid-cols-7 gap-2"
          id="forecast-container"
        >
          <!-- Today (highlighted) -->
          <div
            class="border-2 border-blue-400 bg-gray-50 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase"
              >Today</span
            >
            <span class="text-xl">⛅</span>
            <span class="text-sm font-medium text-gray-800">34°</span>
            <span class="text-xs text-gray-400">24°</span>
          </div>

          <!-- Tue -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Tue</span>
            <span class="text-xl">☀️</span>
            <span class="text-sm font-medium text-gray-800">36°</span>
            <span class="text-xs text-gray-400">25°</span>
          </div>

          <!-- Wed -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Wed</span>
            <span class="text-xl">☀️</span>
            <span class="text-sm font-medium text-gray-800">37°</span>
            <span class="text-xs text-gray-400">26°</span>
          </div>

          <!-- Thu -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Thu</span>
            <span class="text-xl">🌧️</span>
            <span class="text-sm font-medium text-gray-800">30°</span>
            <span class="text-xs text-gray-400">22°</span>
          </div>

          <!-- Fri -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Fri</span>
            <span class="text-xl">🌦️</span>
            <span class="text-sm font-medium text-gray-800">29°</span>
            <span class="text-xs text-gray-400">21°</span>
          </div>

          <!-- Sat -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Sat</span>
            <span class="text-xl">⛅</span>
            <span class="text-sm font-medium text-gray-800">32°</span>
            <span class="text-xs text-gray-400">23°</span>
          </div>

          <!-- Sun -->
          <div
            class="border border-gray-200 rounded-md p-2 flex flex-col items-center gap-1"
          >
            <span class="text-xs text-gray-500 font-medium uppercase">Sun</span>
            <span class="text-xl">☀️</span>
            <span class="text-sm font-medium text-gray-800">35°</span>
            <span class="text-xs text-gray-400">25°</span>
          </div>
        </div>
      </div>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
